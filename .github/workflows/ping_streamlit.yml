name: Keep Streamlit App Awake

on:
  schedule:
    # Every 10 hours (UTC)
    - cron: "0 */10 * * *"
  workflow_dispatch:

jobs:
  ping_streamlit:
    name: Ping Streamlit App
    runs-on: ubuntu-latest
    steps:
      - name: Wake Streamlit (Playwright)
        env:
          SIFT_STREAMLIT_APP_URL: ${{ secrets.SIFT_STREAMLIT_APP_URL }}
        run: |
          if [[ -z "$SIFT_STREAMLIT_APP_URL" ]]; then
            echo "Missing secret: SIFT_STREAMLIT_APP_URL"
            exit 1
          fi

          python -V
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

          python - <<'PY'
          import os
          from playwright.sync_api import sync_playwright, TimeoutError as PlaywrightTimeoutError

          url = os.environ["SIFT_STREAMLIT_APP_URL"].rstrip("/") + "/"
          print(f"Opening: {url}")

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.set_default_timeout(120_000)

              try:
                  page.goto(url, wait_until="domcontentloaded")
              except PlaywrightTimeoutError:
                  # Still proceed: Streamlit can be slow to cold-start.
                  print("Initial navigation timed out; continuing.")

              # If the app is sleeping, Streamlit shows a wake prompt button.
              wake_button = page.get_by_role("button", name="Yes, get this app back up!")
              if wake_button.count() > 0:
                  print("Sleep prompt detected; clicking wake button.")
                  wake_button.first.click()

              # Verify the backend is actually up by waiting for a websocket request.
              # If it never connects, the app likely didn't wake (or is blocked).
              try:
                  page.wait_for_url(lambda u: True, timeout=5_000)
              except PlaywrightTimeoutError:
                  pass

              # Give it some time to start serving; streamlit typically initializes within ~1–2 minutes.
              try:
                  page.wait_for_timeout(30_000)
                  # A simple heuristic: once awake, the DOM will include Streamlit-specific bundles.
                  content = page.content()
                  if "gone to sleep due to inactivity" in content.lower():
                      raise RuntimeError("Still seeing sleep page after wake attempt.")
              finally:
                  browser.close()

          print("Wake attempt completed.")
          PY
