name: Keep Streamlit App Awake

on:
  schedule:
    - cron: "0 */10 * * *"
  workflow_dispatch:

jobs:
  ping_streamlit:
    name: Ping Streamlit App
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          URL="https://sift-4-qs.streamlit.app/"

          for i in 1 2 3; do
            echo "Attempt $i: $URL"
            HTTP_CODE="$(curl -sS -L --max-redirs 20 \
              --connect-timeout 10 --max-time 60 \
              --retry 2 --retry-all-errors --retry-delay 5 \
              -o /dev/null -w "%{http_code}" \
              "$URL" || true)"

            echo "HTTP $HTTP_CODE"
            if [[ "$HTTP_CODE" =~ ^2|^3 ]]; then
              exit 0
            fi

            sleep 5
          done

          echo "Streamlit ping failed after retries"
          exit 1
