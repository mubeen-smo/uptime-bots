name: MMDb Backend Keep-Alive

on:
  schedule:
    - cron: "*/14 3-18 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.MMDB_BACKEND_URL }}/health)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed"
            exit 1
          fi
