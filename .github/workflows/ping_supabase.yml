name: Supabase keepalive

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  ping_supabase:
    name: Ping Supabase
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          BASE_URL="${{ secrets.SUPABASE_URL }}"
          ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          PING_PATH="${{ secrets.SUPABASE_PING_PATH }}"

          if [[ -z "$BASE_URL" ]]; then
            echo "Missing secret: SUPABASE_URL"
            exit 1
          fi
          if [[ -z "$ANON_KEY" ]]; then
            echo "Missing secret: SUPABASE_ANON_KEY"
            exit 1
          fi

          # Optional override (example): /rest/v1/items_table?select=item_id&limit=1
          PING_PATH="${PING_PATH:-/rest/v1/items_table?select=item_id&limit=1}"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${BASE_URL}${PING_PATH}" \
            -H "apikey: ${ANON_KEY}" \
            -H "Authorization: Bearer ${ANON_KEY}")
          echo "Supabase responded: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
